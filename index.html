 clay:{base:[181,104,127],name:'#c77e93'}, plum:{base:[122,104,163],name:'#a692d6'},
 sky:{base:[91,127,163],name:'#8fb2df'}, sage:{base:[95,130,86],name:'#8bbf82'},

};

// ---------- flatten states ----------
const STATES=[]; // {tl, tlIdx, color, name, posts, seed:Vec3, weight}
DATA.forEach((tl,ti)=>{
  tl.states.forEach(st=>{
    STATES.push({tl:tl.name, tlIdx:ti, colorKey:tl.color, name:st.name, posts:st.posts, count:st.posts.length});
  });
});

// deterministic RNG
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const rnd=mulberry(20180901);

// throughline centers on a fibonacci sphere, then jitter state seeds around each center
function fib(n){const pts=[],ga=Math.PI*(3-Math.sqrt(5));for(let i=0;i<n;i++){const y=1-(i/(n-1))*2,r=Math.sqrt(1-y*y),th=ga*i;pts.push([Math.cos(th)*r,y,Math.sin(th)*r]);}return pts;}
const tlCenters=fib(DATA.length);
DATA.forEach((tl,ti)=>{
  const c=tlCenters[ti];
  // local basis
  const up=Math.abs(c[1])<0.9?[0,1,0]:[1,0,0];
  const nx=[c[1]*up[2]-c[2]*up[1],c[2]*up[0]-c[0]*up[2],c[0]*up[1]-c[1]*up[0]];
  const nlen=Math.hypot(...nx); for(let k=0;k<3;k++)nx[k]/=nlen;
  const ny=[c[1]*nx[2]-c[2]*nx[1],c[2]*nx[0]-c[0]*nx[2],c[0]*nx[1]-c[1]*nx[0]];
  const states=STATES.filter(s=>s.tlIdx===ti);
  const spread=0.62; // angular radius of a throughline blob
  states.forEach((s,j)=>{
    const ang=(j/states.length)*Math.PI*2 + rnd()*0.7;
    const rad=spread*(0.25+0.75*Math.sqrt((j+rnd())/states.length));
    const dx=Math.cos(ang)*rad, dy=Math.sin(ang)*rad;
    let v=[c[0]+nx[0]*dx+ny[0]*dy, c[1]+nx[1]*dx+ny[1]*dy, c[2]+nx[2]*dx+ny[2]*dy];
    const L=Math.hypot(...v); s.seed=[v[0]/L,v[1]/L,v[2]/L];
    s.weight=0.010*Math.log((s.count||1)+1); // weighted voronoi — bigger themes, bigger cells
    // colour: a distinct shade of the country's base colour
    const f=states.length>1?(j/(states.length-1)-0.5):0; const m=1+f*0.62;
    const bc=PAL[tl.color].base;
    s.rgb=[Math.min(255,bc[0]*m),Math.min(255,bc[1]*m),Math.min(255,bc[2]*m)];
    s.hex='#'+s.rgb.map(x=>('0'+Math.round(x).toString(16)).slice(-2)).join('');
  });
  tl.centerVec=c;
});

// ---------- domain warp (organic coastlines) — identical for texture & picking ----------
function warpDir(x,y,z){
  let lon=Math.atan2(z,x), lat=Math.asin(Math.max(-1,Math.min(1,y)));
  const w = 0.16*Math.sin(3.1*lat+1.7)*Math.cos(2.3*lon-0.5)
          + 0.09*Math.sin(5.7*lon+2.0)*Math.cos(4.1*lat)
          + 0.05*Math.sin(8.0*lat+lon);
  const w2= 0.16*Math.cos(2.7*lat-0.6)*Math.sin(2.9*lon+1.1)
          + 0.08*Math.cos(6.1*lon)*Math.sin(3.7*lat+0.4);
  lon+=w; lat+=w2*0.7;
  lat=Math.max(-1.5533,Math.min(1.5533,lat));
  const cl=Math.cos(lat);
  return [Math.cos(lon)*cl, Math.sin(lat), Math.sin(lon)*cl];
}
function nearestState(x,y,z){
  const d=warpDir(x,y,z); let best=-2,bi=0;
  for(let i=0;i<STATES.length;i++){const s=STATES[i].seed;
    const score=d[0]*s[0]+d[1]*s[1]+d[2]*s[2]+STATES[i].weight;
    if(score>best){best=score;bi=i;}}
  return bi;
}

// ---------- build equirectangular texture ----------
const TW=1600,TH=800;
function buildTexture(){
  const cv=document.createElement('canvas');cv.width=TW;cv.height=TH;
  const ctx=cv.getContext('2d');const img=ctx.createImageData(TW,TH);const px=img.data;
  const idx=new Int16Array(TW*TH);
  // classify
  for(let j=0;j<TH;j++){
    const lat=(0.5-(j+0.5)/TH)*Math.PI; const cl=Math.cos(lat),sy=Math.sin(lat);
    for(let i=0;i<TW;i++){
      const lon=((i+0.5)/TW*2-1)*Math.PI;
      idx[j*TW+i]=nearestState(Math.cos(lon)*cl, sy, Math.sin(lon)*cl);
    }
  }
  // shade per state (lightness varies within throughline) + borders
  function colFor(si){ const r=STATES[si].rgb; return [r[0],r[1],r[2]]; }
  for(let j=0;j<TH;j++)for(let i=0;i<TW;i++){
    const o=(j*TW+i), si=idx[o]; let [r,g,b]=colFor(si);
    // borders
    const ri=idx[j*TW+((i+1)%TW)], di=idx[(Math.min(TH-1,j+1))*TW+i];
    let border=0, tlBorder=0;
    if(ri!==si){border=1; if(STATES[ri].tlIdx!==STATES[si].tlIdx)tlBorder=1;}
    if(di!==si){border=1; if(STATES[di].tlIdx!==STATES[si].tlIdx)tlBorder=1;}
    // soft latitude shading for sphericity
    const shade=0.82+0.18*Math.cos((j/TH-0.5)*Math.PI*0.7);
    r*=shade;g*=shade;b*=shade;
    if(border){const f=tlBorder?0.26:0.50; r*=f;g*=f;b*=f;}
    const p=o*4; px[p]=r|0;px[p+1]=g|0;px[p+2]=b|0;px[p+3]=255;
  }
  ctx.putImageData(img,0,0);
  // faint graticule
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let k=1;k<12;k++){const x=k/12*TW;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,TH);ctx.stroke();}
  for(let k=1;k<6;k++){const y=k/6*TH;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(TW,y);ctx.stroke();}
  return cv;
}

// ---------- region centroids (label placement in the visual centre of each cell) ----------
function computeCentroids(){
  const GW=360,GH=180;
  const acc=STATES.map(()=>[0,0,0]);
  const tacc=DATA.map(()=>[0,0,0]);
  for(let j=0;j<GH;j++){
    const lat=(0.5-(j+0.5)/GH)*Math.PI, cl=Math.cos(lat), sy=Math.sin(lat);
    for(let i=0;i<GW;i++){
      const lon=((i+0.5)/GW*2-1)*Math.PI;
      const x=Math.cos(lon)*cl, y=sy, z=Math.sin(lon)*cl;
      const si=nearestState(x,y,z), ti=STATES[si].tlIdx;
      // weight by cos(lat) to undo equirectangular area distortion
      acc[si][0]+=x*cl; acc[si][1]+=y*cl; acc[si][2]+=z*cl;
      tacc[ti][0]+=x*cl; tacc[ti][1]+=y*cl; tacc[ti][2]+=z*cl;
    }
  }
  STATES.forEach((s,i)=>{const a=acc[i],L=Math.hypot(a[0],a[1],a[2])||1;s.centroid=[a[0]/L,a[1]/L,a[2]/L];});
  DATA.forEach((tl,t)=>{const a=tacc[t],L=Math.hypot(a[0],a[1],a[2])||1;tl.centroidVec=[a[0]/L,a[1]/L,a[2]/L];});
}

// ---------- three.js scene ----------
let renderer,scene,camera,globe,glow,raf,W,H;
let autoRot=true, dragging=false, lastX=0,lastY=0, velX=0.0016, velY=0;
const rotTarget={x:0,y:0}, rot={x:0,y:0};
let spinTo=null;

function init(){
  const el=document.getElementById('scene');
  W=el.clientWidth;H=el.clientHeight;
  renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W,H);el.appendChild(renderer.domElement);
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);camera.position.set(0,0,7.2);

  const tex=new THREE.CanvasTexture(buildTexture());
  tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
  tex.colorSpace=THREE.SRGBColorSpace!==undefined?THREE.SRGBColorSpace:undefined;
  const geo=new THREE.SphereGeometry(2.2,140,110);
  const mat=new THREE.MeshPhongMaterial({map:tex,shininess:7,specular:0x1a1a24,bumpMap:tex,bumpScale:0.02});
  globe=new THREE.Mesh(geo,mat);scene.add(globe);

  // atmosphere glow
  const ggeo=new THREE.SphereGeometry(2.2,64,48);
  const gmat=new THREE.ShaderMaterial({side:THREE.BackSide,transparent:true,
    uniforms:{c:{value:new THREE.Color(0x9d7bab)}},
    vertexShader:`varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN;uniform vec3 c;void main(){float i=pow(0.72-dot(vN,vec3(0,0,1.0)),2.4);gl_FragColor=vec4(c,i*0.9);}`});
  glow=new THREE.Mesh(ggeo.clone().scale(1.16,1.16,1.16),gmat);scene.add(glow);

  scene.add(new THREE.AmbientLight(0xffffff,0.86));
  const dl=new THREE.DirectionalLight(0xfff4e6,0.85);dl.position.set(5,3,5);scene.add(dl);
  const dl2=new THREE.DirectionalLight(0x8a9bd0,0.35);dl2.position.set(-5,-2,-3);scene.add(dl2);

  // stars
  const sg=new THREE.BufferGeometry();const sp=[];
  for(let i=0;i<1400;i++){const r=40+Math.random()*30,t=Math.random()*7,p=Math.acos(2*Math.random()-1);
    sp.push(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));}
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0x9a97b8,size:0.13,sizeAttenuation:true,transparent:true,opacity:.8})));

  computeCentroids();
  addControls();buildLegend();
  window.addEventListener('resize',onResize);
  document.getElementById('loading').style.opacity='0';
  setTimeout(()=>document.getElementById('loading').style.display='none',600);
  animate();

function onResize(){const el=document.getElementById('scene');W=el.clientWidth;H=el.clientHeight;
  camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);}

// convert screen click to sphere point in *globe local* coords
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2();
function pick(clientX,clientY){
  ndc.x=(clientX/W)*2-1; ndc.y=-(clientY/H)*2+1;
  ray.setFromCamera(ndc,camera);
  const hit=ray.intersectObject(globe,false);
  if(!hit.length)return null;
  const lp=globe.worldToLocal(hit[0].point.clone()).normalize();
  return nearestState(lp.x,lp.y,lp.z);
}

function addControls(){
  const c=renderer.domElement;
  const down=e=>{dragging=true;autoRot=false;lastX=e.clientX;lastY=e.clientY;velX=velY=0;c.style.cursor='grabbing';spinTo=null;};
  const move=e=>{if(!dragging)return;const dx=e.clientX-lastX,dy=e.clientY-lastY;lastX=e.clientX;lastY=e.clientY;
    rotTarget.y+=dx*0.006; rotTarget.x+=dy*0.006; rotTarget.x=Math.max(-1.3,Math.min(1.3,rotTarget.x));
    velX=dx*0.0006; velY=dy*0.0006;};
  const up=e=>{if(!dragging)return;dragging=false;c.style.cursor='grab';
    const md=Math.hypot(e.clientX-downPos.x,e.clientY-downPos.y);
    if(md<5){const si=pick(e.clientX,e.clientY); if(si!=null)openStrip(si);}
  };
  let downPos={x:0,y:0};
  c.addEventListener('pointerdown',e=>{downPos={x:e.clientX,y:e.clientY};down(e);c.setPointerCapture(e.pointerId);});
  c.addEventListener('pointermove',move);
  c.addEventListener('pointerup',up);
  c.addEventListener('wheel',e=>{e.preventDefault();camera.position.z=Math.max(3.4,Math.min(11,camera.position.z+e.deltaY*0.004));},{passive:false});
  c.style.cursor='grab';
}

function animate(){
  raf=requestAnimationFrame(animate);
  if(spinTo){
    rotTarget.y += (spinTo.y-rotTarget.y)*0.08;
    rotTarget.x += (spinTo.x-rotTarget.x)*0.08;
    if(Math.abs(spinTo.y-rotTarget.y)<0.002&&Math.abs(spinTo.x-rotTarget.x)<0.002)spinTo=null;
  } else if(autoRot && !dragging){ rotTarget.y+=0.0016; }
  else if(!dragging){ rotTarget.y+=velX; rotTarget.x+=velY; velX*=0.95; velY*=0.95;
    rotTarget.x=Math.max(-1.3,Math.min(1.3,rotTarget.x)); }
  rot.x+=(rotTarget.x-rot.x)*0.15; rot.y+=(rotTarget.y-rot.y)*0.15;
  globe.rotation.x=rot.x; globe.rotation.y=rot.y;
  glow.rotation.copy(globe.rotation);
  renderer.render(scene,camera);
  updateLabels();
}

// throughline floating labels
const labelEls=[];
const stateLabelEls=[];
function updateLabels(){
  const v=new THREE.Vector3();
  DATA.forEach((tl,i)=>{
    let el=labelEls[i];
    if(!el){el=document.createElement('div');el.className='tl-label';
      // break the name onto tidy lines, centred in the country
      el.innerHTML=tl.name.replace(/ & /g,' &\n').split('\n').map(s=>'<span>'+s.trim()+'</span>').join('<br>');
      el.style.color='#fff';document.body.appendChild(el);labelEls[i]=el;}
    const wv=new THREE.Vector3(...(tl.centroidVec||tl.centerVec));
    v.copy(wv).multiplyScalar(2.2).applyEuler(globe.rotation);
    const facing=v.z; // world z toward camera
    v.project(camera);
    const x=(v.x*0.5+0.5)*W, y=(-v.y*0.5+0.5)*H;
    // font scales with camera distance so labels stay proportional to the globe
    const fs=Math.max(0.7, 2.15*(7.2/camera.position.z));
    el.style.fontSize=fs+'rem';
    el.style.left=x+'px';el.style.top=y+'px';
    // fade out as the country turns to the back of the globe
    const t=(facing-0.15)/1.6;
    el.style.opacity=Math.max(0,Math.min(1,t)).toFixed(2);
  });
  // state (sub-subject) labels, one per region seed
  const sv=new THREE.Vector3();
  STATES.forEach((s,i)=>{
    let el=stateLabelEls[i];
    if(!el){el=document.createElement('div');el.className='st-label';
      el.innerHTML=s.name.replace(/ & /g,'<br>&nbsp;&amp; ').replace(/, /g,',<br>');
      document.body.appendChild(el);stateLabelEls[i]=el;}
    const sc=s.centroid||s.seed; sv.set(sc[0],sc[1],sc[2]).multiplyScalar(2.205).applyEuler(globe.rotation);
    const facing=sv.z; sv.project(camera);
    const x=(sv.x*0.5+0.5)*W, y=(-sv.y*0.5+0.5)*H;
    const fs=Math.max(0.6,1.02*(7.2/camera.position.z));
    el.style.fontSize=fs+'rem';
    el.style.left=x+'px';el.style.top=y+'px';
    const t=(facing-0.28)/1.3;
    el.style.opacity=(Math.max(0,Math.min(1,t))*0.92).toFixed(2);
  });
}

// ---------- legend ----------
function buildLegend(){
  const L=document.getElementById('legend');
  let gi=0; // global STATES index, matching flatten order
  DATA.forEach((tl,i)=>{
    const b=document.createElement('button');b.className='tlrow';
    b.innerHTML=`<span class="sw" style="background:${PAL[tl.color].name}"></span><span>${tl.name}</span><span class="ct">${tl.count}</span>`;
    b.onclick=()=>spinToThroughline(i);
    L.appendChild(b);
    tl.states.forEach(st=>{
      const idx=gi++;
      const s=document.createElement('button');s.className='strow';
      s.innerHTML=`<span class="dot" style="background:${STATES[idx].hex}"></span><span>${st.name}</span><span class="go">\u2197</span><span class="ct">${st.posts.length}</span>`;
      s.title='Open the '+st.posts.length+' posts in '+st.name;
      s.onclick=()=>openStrip(idx);
      L.appendChild(s);
    });
  });
}
function spinToVec(c){
  const lon=Math.atan2(c[0],c[2]);
  const lat=Math.asin(Math.max(-1,Math.min(1,c[1])));
  spinTo={y:-lon, x:lat}; autoRot=false;
}
function spinToThroughline(i){
  const c=DATA[i].centerVec;
  // find rotation.y and x so center faces camera (+z). We rotate globe by (x,y).
  const lon=Math.atan2(c[0],c[2]); // want to bring to +z
  const lat=Math.asin(c[1]);
  spinTo={y:-lon, x:lat}; autoRot=false;
}

// ---------- unroll strip ----------
let curPosts=[];
function openStrip(si){
  const s=STATES[si];
  document.getElementById('sTl').textContent=s.tl;
  document.getElementById('sTl').style.color=PAL[s.colorKey].name;
  document.getElementById('sState').textContent=s.name;
  document.getElementById('sMeta').textContent=s.count+' post'+(s.count>1?'s':'')+' · '+s.posts[0][1].slice(0,4)+'–'+s.posts[s.posts.length-1][1].slice(0,4);
  curPosts=s.posts;
  renderList('');
  document.getElementById('sSearch').value='';
  document.getElementById('strip').classList.add('open');
  autoRot=false;
  spinToVec(s.centroid||s.seed);
}
function renderList(q){
  q=q.toLowerCase().trim();
  const L=document.getElementById('sList');L.innerHTML='';
  let lastYr='';
  const items=q?curPosts.filter(p=>p[0].toLowerCase().includes(q)):curPosts;
  if(!items.length){L.innerHTML='<div style="padding:1.2rem;color:#9a95ab;font-size:.85rem">No posts match.</div>';return;}
  items.forEach(p=>{
    const yr=p[1].slice(0,4);
    if(yr!==lastYr){lastYr=yr;const h=document.createElement('div');h.className='yr';h.textContent=yr;L.appendChild(h);}
    const a=document.createElement('a');a.href=p[2];a.target='_blank';a.rel='noopener';
    a.innerHTML=`<span class="d">${p[1].slice(5)}</span> ${p[0].replace(/</g,'&lt;')} <span class="ar">↗</span>`;
    L.appendChild(a);
  });
}
document.getElementById('sSearch').addEventListener('input',e=>renderList(e.target.value));
document.getElementById('closeStrip').onclick=()=>{document.getElementById('strip').classList.remove('open');autoRot=true;};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('strip').classList.remove('open');autoRot=true;}});

init();
</script>
